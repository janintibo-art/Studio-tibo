name: Build APK Tauri

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: D횄짤compresser et localiser le projet Tauri
        run: |
          set -e
          echo "=== Fichiers 횄  la racine ==="
          ls -la
          ZIP=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP" ]; then echo "ERREUR: aucun .zip 횄  la racine du d횄짤p횄쨈t"; exit 1; fi
          echo "Zip trouv횄짤: $ZIP"
          unzip -q "$ZIP" -d _extracted
          CONF=$(find _extracted -path "*/src-tauri/tauri.conf.json" | head -n 1)
          if [ -z "$CONF" ]; then
            echo "ERREUR: projet Tauri introuvable (src-tauri/tauri.conf.json manquant)"
            find _extracted -maxdepth 3 -type d
            exit 1
          fi
          APP_DIR=$(cd "$(dirname "$(dirname "$CONF")")" && pwd)
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"
          echo "Projet Tauri trouv횄짤 dans: $APP_DIR"
          ls -la "$APP_DIR"

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Rust + cibles Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer le NDK (version fixe, compatible Tauri)
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;26.3.11579264" >/dev/null
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "NDK install횄짤 dans: $ANDROID_HOME/ndk/26.3.11579264"

      - name: D횄짤pendances Node
        run: |
          set -e
          cd "$APP_DIR"
          npm install

      - name: G횄짤n횄짤rer le projet Android (tauri android init)
        run: |
          set -e
          cd "$APP_DIR"
          npx tauri android init

      - name: Compiler l'APK (debug)
        env:
          RUST_BACKTRACE: '1'
        run: |
          set -e
          cd "$APP_DIR"
          npx tauri android build --apk --debug

      - name: Localiser l'APK produit
        run: |
          set -e
          APK=$(find "$APP_DIR/src-tauri/gen/android" -name "*.apk" -path "*debug*" | head -n 1)
          if [ -z "$APK" ]; then
            echo "ERREUR: aucun APK trouv횄짤. Contenu g횄짤n횄짤r횄짤:"
            find "$APP_DIR/src-tauri/gen/android" -name "*.apk" || true
            exit 1
          fi
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"
          echo "APK: $APK"

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: studio-tibo-apk
          path: ${{ env.APK_PATH }}
