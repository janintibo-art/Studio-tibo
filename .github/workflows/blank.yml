name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Décompresser le zip
        run: |
          ZIP=$(ls *.zip | head -n 1)
          echo "Décompression de $ZIP"
          unzip -q "$ZIP" -d _extracted
          DIR=$(dirname "$(find _extracted -name settings.gradle.kts | head -n 1)")
          echo "PROJECT_DIR=$DIR" >> "$GITHUB_ENV"
          echo "Projet trouvé dans : $DIR"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler l'APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
