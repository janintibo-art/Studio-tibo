name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: RÃ©cupÃ©rer le code
        uses: actions/checkout@v4

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Construire le HTML (bundler maison)
        run: node build.js

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: CrÃ©er le projet Android WebView
        run: |
          set -e

          # â”€â”€ Dossiers du projet Android â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/java/com/studiotibo/app
          mkdir -p android/app/src/main/res/values
          mkdir -p android/gradle/wrapper

          # â”€â”€ Copier le HTML compilÃ© dans les assets â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cp dist/studio-tibo-v3.8.3.html android/app/src/main/assets/index.html

          # â”€â”€ settings.gradle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat > android/settings.gradle << 'GRADLE'
          rootProject.name = "StudioTibo"
          include ':app'
          GRADLE

          # â”€â”€ build.gradle (projet racine) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat > android/build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          # â”€â”€ build.gradle (module app) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat > android/app/build.gradle << 'GRADLE'
          plugins { id 'com.android.application' }
          android {
              namespace         'com.studiotibo.app'
              compileSdk        34
              defaultConfig {
                  applicationId   'com.studiotibo.app'
                  minSdk          26
                  targetSdk       34
                  versionCode     1
                  versionName     '3.8.3'
              }
              buildTypes {
                  debug { minifyEnabled false }
              }
          }
          dependencies { implementation 'androidx.webkit:webkit:1.9.0' }
          GRADLE

          # â”€â”€ AndroidManifest.xml â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat > android/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="Studio Tibo"
                  android:theme="@style/AppTheme"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          # â”€â”€ MainActivity.java â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat > android/app/src/main/java/com/studiotibo/app/MainActivity.java << 'JAVA'
          package com.studiotibo.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView wv = new WebView(this);
                  setContentView(wv);
                  WebSettings s = wv.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setUseWideViewPort(false);
                  s.setLoadWithOverviewMode(false);
                  wv.setWebViewClient(new WebViewClient());
                  wv.setWebChromeClient(new WebChromeClient());
                  wv.loadUrl("file:///android_asset/index.html");
              }
          }
          JAVA

          # â”€â”€ ThÃ¨me minimal â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat > android/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen"/>
          </resources>
          XML

          # â”€â”€ Wrapper Gradle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          echo "âœ” Projet Android prÃªt"

      - name: Compiler l'APK (debug)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: studio-tibo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Release (si tag vX.Y)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: STUDIO TIBO ${{ github.ref_name }}
          body: |
            APK Android â€” tÃ©lÃ©chargez **app-debug.apk**, copiez-le sur votre tÃ©lÃ©phone et ouvrez-le.
            (Autorisez Â« sources inconnues Â» Ã  la premiÃ¨re installation.)
